server:
  port: 49082

# 若是配置了Spring Cloud的Gateway网关每次在访问服务时端口号统一为Gateway服务的端口号49082，由Gateway进行统一转发到相应的服务上

spring:
  application:
    # 服务名称，与nacos配置中心的配置文件的名字相同，例如nacos中配置文件名为：whisper-system-dev.yaml
    name: whisper-gateway

  # 上面nacos中配置文件其后缀为-dev表示激活后缀为dev的配置文件，若这里配置的是prod则配置文件名称为whisper-system-prod.yaml
  profiles:
    active:
      - dev

  # nacos配置
  cloud:
    nacos:
      # 配置中心
      config:
        enabled: true
        server-addr: xx.xx.xx.xx:8848
        # 配置文件名称后缀，如：whisper-system-dev.yaml
        file-extension: yaml
        # 命名空间，这里是开发环境，若是上面的profiles后缀设置为其他，如：配置为prod则需要将该命名空间改为prod这个后缀文件所在的命名空间
        namespace: dev
        username: xx
        password: xx
      # 服务发现
      discovery:
        server-addr: xx.xx.xx.xx:8848
        namespace: dev
        username: xx
        password: xx

  #关闭SpringBoot的banner
  main:
    banner-mode: off
